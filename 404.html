<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — WaitTimeTruth.com</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--dark:#111;--border:#222;--muted:#555;--dim:#777;--text:#e8e8e8;--white:#fff;--red:#ff3b30;--green:#22d87c;--fd:'Bebas Neue',sans-serif;--fm:'DM Mono',monospace;--fb:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
h1{font-family:var(--fd);font-size:clamp(48px,10vw,80px);line-height:0.95;color:var(--white);margin-bottom:12px;}
h1 span{color:var(--red);}
p{font-size:16px;color:var(--dim);max-width:440px;margin:0 auto 32px;line-height:1.6;}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.links a{font-family:var(--fm);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;padding:12px 24px;border:1px solid var(--border);color:var(--dim);text-decoration:none;transition:all 0.15s;}
.links a:hover{color:var(--text);border-color:#444;}
.links a.red{background:var(--red);color:var(--white);border-color:var(--red);}
.links a.red:hover{background:#e02d22;}
.code{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-top:48px;}
</style>
</head>
<body>
<h1>WRONG <span>LINE</span></h1>
<p>This page doesn't exist — kind of like that 90-minute posted wait that only took 45. Let's get you somewhere real.</p>
<div class="links">
  <a href="/report" class="red">Report Your Wait</a>
  <a href="/">Park Inflation Rankings</a>
  <a href="/#faq">FAQ</a>
</div>
<div class="code">404 · WAITTIMETRUTH.COM</div>
</body>
</html>
